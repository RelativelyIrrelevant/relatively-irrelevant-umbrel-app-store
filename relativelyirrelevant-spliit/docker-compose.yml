version: "3.8"

services:
  app_proxy:
    environment:
      # IMPORTANT: Umbrel expects the DNS name of the web container as:
      # <app-id>_<service-name>_1
      # Here the service name is "app"
      APP_HOST: relativelyirrelevant-spliit_app_1
      APP_PORT: 3000

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Use whatever Spliit expects (their healthcheck uses -U postgres)
      POSTGRES_DB: spliit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hqmcwdrvavdyuFCPFUQCVSFXPGF36566
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: https://github.com/spliit-app/spliit.git
      dockerfile: Dockerfile
    image: relativelyirrelevant-spliit:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      # Prisma-style DB URL (most likely what Spliit uses internally)
      DATABASE_URL: postgres://postgres:hqmcwdrvavdyuFCPFUQCVSFXPGF36566@db:5432/spliit

      # Add any additional variables from Spliit's container.env.example here
      # (S3/OpenAI opt-in features, etc).

volumes:
  postgres_data:

