version: "3.8"

services:
  app_proxy:
    environment:
      # <app-id>_<service-name>_1
      APP_HOST: relativelyirrelevant-spliit_app_1
      APP_PORT: 3000

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "hqmcwdrvavdyuFCPFUQCVSFXPGF36566"
      # Spliit's env example doesn't set these, but it's safer/cleaner to set:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: https://github.com/spliit-app/spliit.git
      dockerfile: Dockerfile
    image: relativelyirrelevant-spliit:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Mirrors container.env.example logic, but we can’t do ${POSTGRES_PASSWORD}
      # interpolation reliably without an env_file, so we repeat the password.
      POSTGRES_PRISMA_URL: "postgresql://postgres:change-me-to-a-strong-password@db"
      POSTGRES_URL_NON_POOLING: "postgresql://postgres:hqmcwdrvavdyuFCPFUQCVSFXPGF36566@db"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
